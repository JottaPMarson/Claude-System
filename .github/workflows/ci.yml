name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash validate.sh

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck hooks/*.sh install.sh uninstall.sh validate.sh
